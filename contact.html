<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="education.css">
</head>
<body>
    <section id="contact">
  <div class="contact-inner">
    <div class="reveal">
      <div class="section-label" style="justify-content:center;">✦ Reach Out ✦</div>
      <h2 class="section-title">Send us Signal</h2>
      <p class="section-desc" style="margin:1rem auto 0;">Questions, recommendations, or just want to discuss your favourite book?</p>
    </div>
    <form id="contact-form" class="contact-form reveal reveal-delay-1">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input class="form-input" type="text" placeholder="Commander...">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" placeholder="signal@galaxy.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Subject</label>
        <input class="form-input" type="text" placeholder="What brings you to the void?">
      </div>
      <div class="form-group">
        <label class="form-label">Message</label>
        <textarea class="form-textarea" placeholder="Transmit your thoughts across the stars..."></textarea>
      </div>
      <button type="submit" class="btn-primary" style="align-self:center;padding:1rem 3rem;border:none;">Transmit Message</button>
    </form>
    <div id="contact-feedback" class="contact-feedback" aria-live="polite" style="text-align:center;margin-top:1rem;display:none"></div>
    <div style="text-align:center;margin-top:1rem">
      <a href="admin.html" id="admin-link" style="color:#fff;background:#222;padding:0.4rem 0.8rem;border-radius:6px;text-decoration:none;">Admin</a>
    </div>
  </div>
</section>
<script src="script.js"></script>
</body>
</html>
